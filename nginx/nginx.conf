user nginx;
worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;
    sendfile on;
    keepalive_timeout 65;

    upstream backend {
        server backend_app:5000;
    }

    upstream frontend {
        server frontend_app:3000;
    }

    # HTTP: solo challenge + redirección a HTTPS
    server {
        listen 80;
        server_name erp.pcmaker.mx;

        # Challenge para Certbot (debe coincidir con -w /var/www/certbot)
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        # Redirigir todo lo demás a HTTPS
        location / {
            return 301 https://$host$request_uri;
        }
    }

    # HTTPS real con certificados de Let's Encrypt
    server {
        listen 443 ssl;
        server_name erp.pcmaker.mx;

        ssl_certificate     /etc/letsencrypt/live/erp.pcmaker.mx/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/erp.pcmaker.mx/privkey.pem;

        location /api/ {
            proxy_pass http://backend;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location / {
            proxy_pass http://frontend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }
    }
}