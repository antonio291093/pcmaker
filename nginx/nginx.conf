user nginx;
worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;
    sendfile on;
    keepalive_timeout 65;

    # ---------------------------------------------------
    # Server HTTP (redirige a HTTPS y ACME)
    # ---------------------------------------------------
    server {
        listen 80;
        server_name pcmaker.mx www.pcmaker.mx;

        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # ---------------------------------------------------
    # Server HTTPS
    # ---------------------------------------------------
    server {
        listen 443 ssl;
        server_name pcmaker.mx www.pcmaker.mx;

        ssl_certificate     /etc/letsencrypt/live/pcmaker.mx/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/pcmaker.mx/privkey.pem;

        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5;

        add_header X-Frame-Options "DENY";
        add_header X-Content-Type-Options "nosniff";
        add_header X-XSS-Protection "1; mode=block";
        add_header Referrer-Policy "strict-origin-when-cross-origin";

        # Static Next.js files
        location /_next/static/ {
            proxy_pass http://frontend_app:3000/_next/static/;
            proxy_cache_valid 200 60m;
            proxy_cache_valid 404 1m;
        }

        # Backend API
        location /api/ {
            proxy_pass http://backend_app:5000/;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }

        # Todo lo demás → frontend
        location / {
            proxy_pass http://frontend_app:3000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }
    }
}
