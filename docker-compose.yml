services:
  backend:
    build:
      context: ./backend
    container_name: backend_app
    restart: always
    environment:
      NODE_ENV: production
      PORT: 5000
      DATABASE_URL: postgresql://postgres:pcmaker@172.17.0.1:5432/pcmaker
    networks:
      - appnet

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}   # <── Necesario para el build
    container_name: frontend_app
    restart: always
    environment:
      NODE_ENV: production
      PORT: 3000
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}   # <── Necesario en runtime
    depends_on:
      - backend
    networks:
      - appnet

  nginx:
    image: nginx:latest
    container_name: nginx_reverse_proxy
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
      - certbot_web:/var/www/certbot
      - certbot_certs:/etc/letsencrypt
    depends_on:
      - frontend
      - backend
    networks:
      - appnet

  certbot:
    image: certbot/certbot
    container_name: certbot_service
    restart: always
    entrypoint: /bin/sh
    command: >
      -c "certbot certonly --webroot -w /var/www/certbot
      --email soporte@pcmaker.mx --agree-tos --no-eff-email
      -d erp.pcmaker.mx &&
      echo '0 3 * * * certbot renew --webroot -w /var/www/certbot --quiet && nginx -s reload' > /etc/crontabs/root &&
      crond -f"
    volumes:
      - certbot_web:/var/www/certbot
      - certbot_certs:/etc/letsencrypt
    networks:
      - appnet

volumes:
  certbot_web:
  certbot_certs:

networks:
  appnet:
