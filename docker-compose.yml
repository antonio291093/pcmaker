version: "3.9"

services:
  postgres:
    image: postgres:15
    container_name: postgres_db
    restart: always
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: erpdb
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - appnet

  backend:
    build: ./backend
    container_name: backend_app
    restart: always
    environment:
      NODE_ENV: production
      PORT: 5000
      DATABASE_URL: postgres://user:password@postgres:5432/erpdb
    depends_on:
      - postgres
    networks:
      - appnet

  frontend:
    build: ./frontend
    container_name: frontend_app
    restart: always
    environment:
      NODE_ENV: production
      PORT: 3000
    depends_on:
      - backend
    networks:
      - appnet

  nginx:
    image: nginx:latest
    container_name: nginx_reverse_proxy
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
      - /etc/letsencrypt:/etc/letsencrypt
    depends_on:
      - frontend
      - backend
    networks:
      - appnet

volumes:
  pgdata:

networks:
  appnet:
