version: "3.9"

services:
  postgres:
    image: postgres:15
    container_name: postgres_db
    restart: always
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: erpdb
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - appnet

  backend:
    build: ./backend
    container_name: backend_app
    restart: always
    environment:
      NODE_ENV: production
      PORT: 5000
      DATABASE_URL: postgres://user:password@postgres:5432/erpdb
    depends_on:
      - postgres
    networks:
      - appnet

  frontend:
    build: ./frontend
    container_name: frontend_app
    restart: always
    environment:
      NODE_ENV: production
      PORT: 3000
      NEXT_PUBLIC_API_URL: "https://pcmaker.mx/api"
    depends_on:
      - backend
    networks:
      - appnet

  nginx:
    image: nginx:latest
    container_name: nginx_reverse_proxy
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
      - certbot_web:/var/www/certbot
      - certbot_certs:/etc/letsencrypt
    depends_on:
      - frontend
      - backend
    networks:
      - appnet

  certbot:
    image: certbot/certbot
    container_name: certbot_service
    restart: always
    entrypoint: /bin/sh
    command: -c "
        # Obtener certificado inicial (solo la primera vez)
        certbot certonly --webroot -w /var/www/certbot \
        --email soporte@pcmaker.mx --agree-tos --no-eff-email \
        -d pcmaker.mx -d www.pcmaker.mx;

        # Registrar cron job para renovación diaria
        echo '0 3 * * * certbot renew --webroot -w /var/www/certbot --quiet && nginx -s reload' > /etc/crontabs/root;

        # Ejecutar cron en modo foreground
        crond -f
    "
    volumes:
      - certbot_web:/var/www/certbot
      - certbot_certs:/etc/letsencrypt
    networks:
      - appnet

volumes:
  pgdata:
  certbot_web:
  certbot_certs:

networks:
  appnet:
