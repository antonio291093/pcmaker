services:

  # =====================
  # BACKEND ERP API
  # =====================
  backend:
    build:
      context: ./backend
    container_name: backend_app
    restart: always
    env_file: .env
    environment:
      NODE_ENV: production
      PORT: 5000
    volumes:
      - ./backend/uploads:/app/uploads
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - appnet


  # =====================
  # CATALOGO NEXTJS
  # =====================
  catalogo:
    build:
      context: ./catalogo
    container_name: catalogo_app
    restart: always
    environment:
      NODE_ENV: production
    ports:
      - "3001:3000"
    networks:
      - appnet


  # =====================
  # NGINX REVERSE PROXY
  # =====================
  nginx:
    image: nginx:latest
    container_name: nginx_reverse_proxy
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
      - ./frontend-static:/var/www/pcmaker/frontend-static:ro
      - ./backend/uploads:/var/www/pcmaker/backend/uploads:ro
      - certbot_web:/var/www/certbot
      - certbot_certs:/etc/letsencrypt
    depends_on:
      - backend
      - catalogo
    networks:
      - appnet


  # =====================
  # CERTBOT SSL
  # =====================
  certbot:
    image: certbot/certbot
    container_name: certbot_service
    entrypoint: /bin/sh
    command: >
      -c "certbot certonly --webroot -w /var/www/certbot
      --email soporte@pcmaker.mx --agree-tos --no-eff-email
      --non-interactive --keep-until-expiring
      -d erp.pcmaker.mx -d catalogo.pcmaker.mx &&
      echo '0 3 * * * certbot renew --webroot -w /var/www/certbot --quiet && nginx -s reload' > /etc/crontabs/root &&
      crond -f"
    volumes:
      - certbot_web:/var/www/certbot
      - certbot_certs:/etc/letsencrypt
    networks:
      - appnet


volumes:
  certbot_web:
  certbot_certs:


networks:
  appnet: